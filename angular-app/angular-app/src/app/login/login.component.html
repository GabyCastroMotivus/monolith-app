<div class="bg-gray-800 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-lg flex max-w-4xl w-full">
     <div class="w-1/2 p-8">
      <div class="mb-6">
       <h3 class="text-xl font-semibold mt-4">
        Login
       </h3>
       <p class="text-sm mt-2">
        Don't have an account?
        <a class="text-orange-500 cursor-pointer" (click)="openSignupModal()">
         Sign Up Now
        </a>
       </p>
      </div>
      <form>
       <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700" for="email">
         Email Address
        </label>
        <div class="mt-1 relative rounded-md shadow-sm">
         <input class="block w-full pr-10 border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500 sm:text-sm" required="" id="email" placeholder="Email Address" type="email"/>
         <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
          <i class="fas fa-envelope text-gray-400">
          </i>
         </div>
        </div>
       </div>
       <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700" for="password">
         Password
        </label>
        <div class="mt-1 relative rounded-md shadow-sm">
         <input class="block w-full pr-10 border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="password" required="" placeholder="Password" type="password"/>
         <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
          <i class="fas fa-lock text-gray-400">
          </i>
         </div>
        </div>
       </div>
       <div class="flex items-center mb-4">
        <input class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300 rounded" id="remember_me" type="checkbox"/>
        <label class="ml-2 block text-sm text-gray-900" for="remember_me">
         Remember Me
        </label>
       </div>
       <div>
        <button class="w-full bg-orange-500 text-white py-2 px-4 rounded-md hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500" type="submit" routerLink="/homepage">
         Log In
        </button>
       </div>
       <div class="mt-4 text-center">
        <a class="text-sm text-orange-500" href="#">
         Forgot Your Password?
        </a>
       </div>
      </form>
      <div class="mt-6 text-xs text-gray-500">
       <p>
        Copyright © 2025 Motivus, Inc.
       </p>
       <p class="mt-2">
        <a class="text-gray-500 hover:text-gray-700" href="#">
         Terms of Service
        </a>
        |
        <a class="text-gray-500 hover:text-gray-700" href="#">
         Privacy Policy
        </a>
       </p>
      </div>
     </div>
     <div class="w-1/2 hidden md:block">
      <img alt="Illustration of a rocket launching with mountains and a starry sky in the background" class="w-full h-full object-cover rounded-r-lg" height="800" src="https://storage.googleapis.com/a1aa/image/zsufwRvZW1wFBkqPsPJU86zLeYDgMyhUlKtlPD2-d_g.jpg" width="600"/>
     </div>
    </div>
    


    <div class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden" id="id02">
        <div class="bg-white w-full max-w-lg p-6 rounded-lg shadow-lg" style="max-width:600px">
         <div class="text-right">
          <button class="text-gray-500 hover:text-gray-700" (click)="closeSignupModal()">
           ×
          </button>
         </div>
         <div class="text-center mb-6">
          <h2 class="text-2xl font-bold">
           Sign Up
          </h2>
         </div>
         <form>
          <div class="mb-4">
           <label class="block text-sm font-medium text-gray-700">
            Email
           </label>
           <input class="w-full border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500" placeholder="Email" required="" type="email"/>
          </div>
          <div class="mb-4">
           <label class="block text-sm font-medium text-gray-700">
            Enter Username
           </label>
           <input class="w-full border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500" placeholder="Enter Username" required="" type="text"/>
          </div>
          <div class="mb-4">
           <label class="block text-sm font-medium text-gray-700">
            Enter Password
           </label>
           <input class="w-full border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500" placeholder="Enter Password" required="" type="password"/>
          </div>
          <div class="mb-4">
           <label class="block text-sm font-medium text-gray-700">
            DOB
           </label>
           <input class="w-full border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500" required="" type="date"/>
          </div>
          <div class="mb-4">
           <label class="block text-sm font-medium text-gray-700">
            Gender
           </label>
           <div class="flex items-center space-x-4">
            <label class="flex items-center">
             <input class="form-radio" name="gender" type="radio" value="male"/>
             <span class="ml-2">
              Male
             </span>
            </label>
            <label class="flex items-center">
             <input class="form-radio" name="gender" type="radio" value="female"/>
             <span class="ml-2">
              Female
             </span>
            </label>
            <label class="flex items-center">
             <input class="form-radio" name="gender" type="radio" value="other"/>
             <span class="ml-2">
              Other
             </span>
            </label>
           </div>
          </div>
          <button class="w-full bg-orange-500 text-white py-2 px-4 rounded-md hover:bg-orange-600">
           Sign Up
          </button>
         </form>
         <div class="mt-4 text-right">
          <button class="text-red-500 hover:text-red-700" (click)="closeSignupModal()">
           Cancel
          </button>
         </div>
        </div>
       </div>
   
</div>
